<!DOCTYPE html>
<html>
<head>
    <title>Debug Interface</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1e1e1e; color: #00ff00; }
        .log { margin: 10px 0; padding: 10px; background: #000; border-left: 3px solid #00ff00; }
        .error { border-left-color: #ff0000; }
        .success { border-left-color: #00ff00; }
    </style>
</head>
<body>
    <h1>Debug Console</h1>
    <div id="logs"></div>
    <script>
        const logsDiv = document.getElementById('logs');

        function log(type, msg) {
            const div = document.createElement('div');
            div.className = 'log ' + type;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logsDiv.appendChild(div);
            console.log(msg);
        }

        async function test() {
            log('info', 'Iniciando testes...');

            try {
                log('info', 'Testando /api/health...');
                const h = await fetch('/api/health');
                log(h.ok ? 'success' : 'error', `Health: ${h.status}`);

                log('info', 'Testando /api/stats...');
                const s = await fetch('/api/stats');
                const stats = await s.json();
                log('success', `Stats: ${JSON.stringify(stats)}`);

                log('info', 'Testando /api/results...');
                const r = await fetch('/api/results');
                const results = await r.json();
                log('success', `Results: ${results.length} items`);
                results.forEach((res, i) => {
                    log('info', `  [${i}] ${res.arquivo || 'N/A'} - ${res.total} testes`);
                });

            } catch (e) {
                log('error', `Erro: ${e.message}`);
            }
        }

        window.onload = test;
    </script>
</body>
</html>
