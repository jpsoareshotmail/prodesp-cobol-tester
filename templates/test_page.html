<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste da Interface Web - BRQ | COBOL</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --brq-green: #00C853;
            --brq-green-dark: #00A844;
            --brq-green-light: #00E676;
            --brq-danger: #E53935;
            --brq-info: #1E88E5;
            --brq-border: #E5E7EB;
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #FAFAFA;
            color: #333333;
            min-height: 100vh;
            padding: 32px 24px;
            line-height: 1.6;
        }
        .container { max-width: 900px; margin: 0 auto; }
        h1 {
            color: #1A1A1A;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        .subtitle {
            color: #888888;
            font-size: 13px;
            margin-bottom: 32px;
        }
        .card {
            background: #FFFFFF;
            border: 1px solid var(--brq-border);
            padding: 24px;
            margin-bottom: 20px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            transition: border-color 0.3s;
        }
        .card:hover { border-color: var(--brq-green); }
        .card h2 {
            color: #1A1A1A;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            letter-spacing: -0.3px;
        }
        .btn {
            padding: 10px 20px;
            background: #1A1A1A;
            color: #FFFFFF;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s;
            letter-spacing: -0.2px;
        }
        .btn:hover {
            background: #333333;
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
        }
        .log {
            margin: 6px 0;
            padding: 10px 14px;
            background: #F7F8FA;
            border-left: 3px solid var(--brq-border);
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 12px;
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            color: #555555;
        }
        .log.error { border-left-color: var(--brq-danger); color: var(--brq-danger); }
        .log.success { border-left-color: var(--brq-green); color: #166534; }
        .log.info { border-left-color: var(--brq-info); color: var(--brq-info); }
        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            margin: 10px 0;
            background: #FFFFFF;
            border: 1px solid var(--brq-border);
            border-radius: var(--radius-sm);
            color: #1A1A1A;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: var(--brq-green);
            box-shadow: 0 0 0 3px rgba(0, 200, 83, 0.1);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 12px;
        }
        .stat-box {
            text-align: center;
            padding: 16px;
            background: #F7F8FA;
            border: 1px solid var(--brq-border);
            border-radius: var(--radius-md);
        }
        .stat-box .value {
            font-size: 24px;
            font-weight: 800;
            color: var(--brq-green);
        }
        .stat-box .label {
            font-size: 11px;
            color: #888888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }
        .result-item {
            padding: 16px;
            background: #F7F8FA;
            border: 1px solid var(--brq-border);
            border-radius: var(--radius-md);
            margin-bottom: 10px;
            border-left: 3px solid var(--brq-green);
        }
        .result-item .title { font-weight: 600; color: #1A1A1A; margin-bottom: 6px; }
        .result-item .date { font-size: 11px; color: #888888; margin-bottom: 8px; }
        .result-item .mini-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; font-size: 12px; text-align: center; }
        .plate-result {
            padding: 16px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--brq-border);
            background: #F7F8FA;
            margin-top: 12px;
        }
        .header-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--brq-border);
        }
        .header-bar img { height: 32px; width: auto; }
        footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid var(--brq-border);
            text-align: center;
            color: #888888;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-bar">
            <img src="/static/logobrq.png" alt="BRQ">
            <div>
                <h1>Teste da Interface Web</h1>
                <p class="subtitle" style="margin-bottom:0">Validacao dos endpoints da API COBOL</p>
            </div>
        </div>

        <div class="card">
            <h2>Status do Servidor</h2>
            <button class="btn" onclick="testHealth()">Testar Conexao</button>
            <div id="health-log"></div>
        </div>

        <div class="card">
            <h2>Estatisticas</h2>
            <button class="btn" onclick="testStats()">Carregar Estatisticas</button>
            <div id="stats-log"></div>
            <div id="stats-display"></div>
        </div>

        <div class="card">
            <h2>Resultados de Testes</h2>
            <button class="btn" onclick="testResults()">Carregar Resultados</button>
            <div id="results-log"></div>
            <div id="results-display"></div>
        </div>

        <div class="card">
            <h2>Validar Placa</h2>
            <input type="text" id="plate-input" placeholder="Digite uma placa (ex: AAA0A00)">
            <button class="btn" onclick="testPlate()">Validar</button>
            <div id="plate-log"></div>
            <div id="plate-display"></div>
        </div>

        <div class="card">
            <h2>Executar Tudo</h2>
            <button class="btn" onclick="runAll()">Teste Completo</button>
            <div id="all-log"></div>
        </div>

        <footer>
            <span>BRQ Digital Solutions &copy; 2026 &mdash; Todos os direitos reservados</span>
        </footer>
    </div>

    <script>
    function addLog(elementId, message, type) {
        type = type || 'info';
        const el = document.getElementById(elementId);
        if (!el) return;
        const log = document.createElement('div');
        log.className = 'log ' + type;
        log.textContent = '[' + new Date().toLocaleTimeString() + '] ' + message;
        el.appendChild(log);
    }

    async function testHealth() {
        const el = 'health-log';
        document.getElementById(el).innerHTML = '';
        addLog(el, 'Testando /api/health...', 'info');
        try {
            const res = await fetch('/api/health');
            const data = await res.json();
            if (res.ok) { addLog(el, 'Servidor respondendo! Status: ' + res.status, 'success'); addLog(el, 'Resposta: ' + JSON.stringify(data), 'success'); }
            else { addLog(el, 'Erro: HTTP ' + res.status, 'error'); }
        } catch (e) { addLog(el, 'Erro de conexao: ' + e.message, 'error'); }
    }

    async function testStats() {
        const el = 'stats-log'; const dEl = 'stats-display';
        document.getElementById(el).innerHTML = ''; document.getElementById(dEl).innerHTML = '';
        addLog(el, 'Carregando /api/stats...', 'info');
        try {
            const res = await fetch('/api/stats'); const data = await res.json();
            if (res.ok) {
                addLog(el, 'Dados recebidos', 'success');
                document.getElementById(dEl).innerHTML = '<div class="stats-grid"><div class="stat-box"><div class="value">' + data.total_execucoes + '</div><div class="label">Execucoes</div></div><div class="stat-box"><div class="value">' + data.taxa_sucesso.toFixed(1) + '%</div><div class="label">Taxa Sucesso</div></div><div class="stat-box"><div class="value">' + data.total_passed + '</div><div class="label">Passando</div></div></div>';
            } else { addLog(el, 'Erro: HTTP ' + res.status, 'error'); }
        } catch (e) { addLog(el, 'Erro: ' + e.message, 'error'); }
    }

    async function testResults() {
        const el = 'results-log'; const dEl = 'results-display';
        document.getElementById(el).innerHTML = ''; document.getElementById(dEl).innerHTML = '';
        addLog(el, 'Carregando /api/results...', 'info');
        try {
            const res = await fetch('/api/results'); const data = await res.json();
            if (res.ok) {
                addLog(el, data.length + ' resultado(s) encontrado(s)', 'success');
                if (data.length === 0) { document.getElementById(dEl).innerHTML = '<p style="color:#888;margin-top:12px">Nenhum resultado disponivel</p>'; return; }
                let html = '';
                data.slice(0, 3).forEach(function(result) {
                    html += '<div class="result-item"><div class="title">' + result.arquivo + '</div><div class="date">' + new Date(result.data).toLocaleString('pt-BR') + '</div><div class="mini-stats"><div><div style="font-weight:700">' + result.total + '</div><div style="font-size:10px;color:#888">Total</div></div><div><div style="font-weight:700;color:var(--brq-green)">' + result.passed + '</div><div style="font-size:10px;color:#888">Passou</div></div><div><div style="font-weight:700;color:var(--brq-danger)">' + result.failed + '</div><div style="font-size:10px;color:#888">Falhou</div></div></div></div>';
                });
                document.getElementById(dEl).innerHTML = html;
            } else { addLog(el, 'Erro: HTTP ' + res.status, 'error'); }
        } catch (e) { addLog(el, 'Erro: ' + e.message, 'error'); }
    }

    async function testPlate() {
        const el = 'plate-log'; const dEl = 'plate-display';
        const plate = document.getElementById('plate-input').value.trim();
        document.getElementById(el).innerHTML = ''; document.getElementById(dEl).innerHTML = '';
        if (!plate) { addLog(el, 'Digite uma placa!', 'error'); return; }
        addLog(el, 'Validando placa: ' + plate, 'info');
        try {
            const res = await fetch('/api/validate-plate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ placa: plate }) });
            const data = await res.json();
            if (res.ok) {
                addLog(el, 'Resposta recebida', 'success');
                const color = data.valida ? 'var(--brq-green)' : 'var(--brq-danger)';
                const status = data.valida ? '&#10003; Valida' : '&#10007; Invalida';
                document.getElementById(dEl).innerHTML = '<div class="plate-result" style="border-color:' + color + '"><div style="font-weight:700;color:' + color + ';margin-bottom:10px">' + status + '</div><div style="font-size:13px;color:#444"><div><strong>Placa:</strong> ' + data.placa + '</div><div><strong>Codigo:</strong> ' + data.codigo + '</div><div><strong>Tipo:</strong> ' + data.descricao + '</div></div></div>';
            } else { addLog(el, 'Erro: HTTP ' + res.status + ' - ' + data.error, 'error'); }
        } catch (e) { addLog(el, 'Erro: ' + e.message, 'error'); }
    }

    async function runAll() {
        const el = 'all-log'; document.getElementById(el).innerHTML = '';
        addLog(el, 'Iniciando teste completo...', 'info');
        await new Promise(function(r) { setTimeout(r, 300); });
        addLog(el, '1. Testando conexao...', 'info'); await testHealth();
        await new Promise(function(r) { setTimeout(r, 300); });
        addLog(el, '2. Carregando estatisticas...', 'info'); await testStats();
        await new Promise(function(r) { setTimeout(r, 300); });
        addLog(el, '3. Carregando resultados...', 'info'); await testResults();
        await new Promise(function(r) { setTimeout(r, 300); });
        addLog(el, 'Teste completo!', 'success');
    }
    </script>
</body>
</html>
